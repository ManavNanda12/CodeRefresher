<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Page Not Found | Developer Refresher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://coderefresher.pages.dev/">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b0b12; color: #fff; text-align: center; padding: 2rem 1rem;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .code {
      font-size: clamp(4rem, 14vw, 8rem); font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, #c3002f 0%, #ff4857 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    h1 { margin: .5rem 0 .75rem; font-size: 1.75rem; }
    p { color: rgba(255,255,255,.7); margin: 0 0 1.75rem; }
    a {
      display: inline-block; padding: .7rem 1.4rem; border-radius: 999px; font-weight: 600;
      text-decoration: none; color: #fff; background: linear-gradient(135deg, #c3002f 0%, #ff4857 100%);
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist — it may have moved or never existed.</p>
    <a href="/">⚡ Back to Home</a>
  </main>
</body>
</html>
