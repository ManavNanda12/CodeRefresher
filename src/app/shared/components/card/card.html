<article class="card" [class.is-open]="expanded()" [class.mastered]="mastered()">

  <!-- ── Header row: question trigger · master toggle · chevron ── -->
  <div class="card-head">
    <button class="card-trigger"
            (click)="toggle()"
            [attr.aria-expanded]="expanded()"
            aria-controls="card-body-{{ index() }}">
      <span class="q-index">#{{ index() }}</span>
      <span class="q-col">
        <span class="question-text">{{ item().question }}</span>
        @if (tier(); as t) {
          <span class="q-meta">
            <span class="tier-badge" [style.--tier]="t.color">{{ t.label }}</span>
            <span class="xp-badge">⚡ {{ t.xp }} XP</span>
            @if (mastered()) { <span class="done-badge">✓ Mastered</span> }
          </span>
        }
      </span>
    </button>

    <button class="master-btn"
            [class.on]="mastered()"
            (click)="toggleMaster($event)"
            [attr.aria-pressed]="mastered()"
            [title]="mastered() ? 'Mastered — click to undo' : 'Mark as mastered'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </button>

    <button class="chevron-btn" [class.rotated]="expanded()" (click)="toggle()" aria-label="Toggle answer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
  </div>

  <!-- ── Animated body ──────────────────────────────── -->
  <div class="body-anim" [class.open]="expanded()" [id]="'card-body-' + index()">
    <div class="body-clip">
      <div class="card-body">

        <!-- Answer -->
        <section class="section answer-section">
          <header class="section-header">
            <span class="section-badge answer-badge">Answer</span>
          </header>
          <p class="section-content">{{ item().answer }}</p>
        </section>

        <!-- Code Example (only shown when present) -->
        @if (item().codeExample) {
          <section class="section code-section">
            <header class="section-header">
              <span class="section-badge code-badge">Code Example</span>
              <button class="copy-btn"
                      [class.copied]="copied()"
                      (click)="copyCode($event)"
                      [attr.aria-label]="copied() ? 'Copied!' : 'Copy code'">
                @if (copied()) {
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2.5"
                       stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                  Copied!
                } @else {
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                  Copy
                }
              </button>
            </header>
            <pre class="code-pre"><code class="code-content">{{ item().codeExample }}</code></pre>
          </section>
        }

        <!-- Simple Example -->
        <section class="section simple-section">
          <header class="section-header">
            <span class="section-badge simple-badge">💡 Simple Analogy</span>
          </header>
          <p class="section-content simple-text">{{ item().simpleExample }}</p>
        </section>

        <!-- Master CTA -->
        <button class="master-cta" [class.on]="mastered()" (click)="toggleMaster($event)">
          @if (mastered()) { ✓ Mastered — nice work } @else { Mark as Mastered ⚡ +{{ tier()?.xp ?? 10 }} XP }
        </button>

      </div>
    </div>
  </div>

</article>
